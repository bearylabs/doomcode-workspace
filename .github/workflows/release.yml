name: Release

on:
    push:
        tags:
            - v*.*.*

permissions:
    contents: write

jobs:
    release:
        name: Package and publish extension
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Verify tag matches package version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  if [ "v$VERSION" != "$GITHUB_REF_NAME" ]; then
                    echo "Tag $GITHUB_REF_NAME does not match package.json version v$VERSION"
                    exit 1
                  fi

            - name: Compile
              run: npm run compile

            - name: Package VSIX
              run: |
                  VSIX_NAME="doom-workspace-${GITHUB_REF_NAME}.vsix"
                  npx @vscode/vsce package --out "$VSIX_NAME"
                  echo "VSIX_NAME=$VSIX_NAME" >> "$GITHUB_ENV"

            - name: Create GitHub Release
              run: |
                  gh release create "$GITHUB_REF_NAME" "$VSIX_NAME" \
                    --notes "See [Doom Code changelog](https://github.com/bearylabs/doomcode/blob/main/CHANGELOG.md) for release notes." \
                    --title "$GITHUB_REF_NAME"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Publish to VS Code Marketplace
              run: npx @vscode/vsce publish --packagePath "$VSIX_NAME"
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}

            - name: Publish to Open VSX Registry
              run: npx ovsx publish "$VSIX_NAME"
              env:
                  OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}
